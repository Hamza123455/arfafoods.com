<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Script Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--surface:#161B22;--surface2:#1C2128;
  --border:#30363D;--accent:#58A6FF;--glow:rgba(88,166,255,.13);
  --text:#E6EDF3;--muted:#8B949E;--green:#3FB950;--purple:#BC8CFF;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --sidebar:240px;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;min-height:100vh}

/* TOPBAR */
topbar{
  display:flex;align-items:center;gap:.75rem;padding:0 1.25rem;height:52px;
  background:rgba(13,17,23,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;flex-shrink:0;
}
.hamburger{
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:.3rem;border-radius:5px;display:flex;align-items:center;transition:color .15s;
}
.hamburger:hover{color:var(--text)}
.topbar-logo{
  display:flex;align-items:center;gap:.45rem;
  font-weight:600;font-size:.9rem;color:var(--text);text-decoration:none;white-space:nowrap;
}
.topbar-logo svg{color:var(--accent)}
.topbar-search{position:relative;flex:1;max-width:300px;margin-left:auto}
.topbar-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#searchInput{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:.35rem .7rem .35rem 1.9rem;
  color:var(--text);font-family:var(--sans);font-size:.8rem;outline:none;transition:border-color .2s;
}
#searchInput::placeholder{color:var(--muted)}
#searchInput:focus{border-color:var(--accent)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:transform .25s ease,width .25s ease;overflow:hidden;
}
#sidebar.closed{width:0}
.sidebar-head{
  padding:.85rem 1rem .65rem;border-bottom:1px solid var(--border);
  font-size:.7rem;font-weight:600;letter-spacing:.08em;color:var(--muted);
  text-transform:uppercase;flex-shrink:0;
}
#fileList{flex:1;overflow-y:auto;padding:.4rem 0}
#fileList::-webkit-scrollbar{width:4px}
#fileList::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.file-item{
  display:flex;align-items:center;gap:.55rem;padding:.55rem 1rem;
  cursor:pointer;font-size:.82rem;color:var(--muted);
  border-left:2px solid transparent;transition:background .15s,color .15s,border-color .15s;
  user-select:none;
}
.file-item:hover{background:var(--surface2);color:var(--text)}
.file-item.active{background:var(--glow);color:var(--accent);border-left-color:var(--accent)}
.file-item svg{flex-shrink:0;opacity:.6}
.file-item.active svg{opacity:1}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:1.75rem clamp(1rem,3vw,2rem)}
#content::-webkit-scrollbar{width:5px}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.75rem}
.content-title{font-size:1rem;font-weight:600}
#countLabel{font-size:.78rem;color:var(--muted)}

/* WELCOME */
#welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:3rem 1.5rem;text-align:center;color:var(--muted);gap:.6rem;
}
#welcome svg{color:var(--border);margin-bottom:.5rem}
#welcome h2{font-size:1rem;font-weight:600;color:var(--text)}
#welcome p{font-size:.82rem;line-height:1.6;max-width:300px}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,520px),1fr));
  gap:1rem;
}

/* CARD */
.card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;overflow:hidden;display:flex;flex-direction:column;
  transition:border-color .2s,box-shadow .2s;position:relative;
}
.card::after{
  content:'';position:absolute;inset:0 0 auto 0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--purple));
  border-radius:9px 9px 0 0;
  transform:scaleX(0);transform-origin:left;transition:transform .25s ease;
}
.card:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(0,0,0,.3)}
.card:hover::after{transform:scaleX(1)}

.card-top{padding:.8rem .95rem .65rem}
.card-title{font-size:.88rem;font-weight:600;margin-bottom:.2rem}
.card-desc{
  font-size:.76rem;color:var(--muted);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

.code-area{background:var(--bg);border-top:1px solid var(--border)}
.code-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.38rem .75rem;border-bottom:1px solid var(--border);
}
.code-bar span{font-size:.67rem;color:var(--muted);font-family:var(--mono)}
.copy-btn{
  display:flex;align-items:center;gap:.28rem;
  background:none;border:1px solid var(--border);border-radius:4px;
  color:var(--muted);font-family:var(--sans);font-size:.68rem;font-weight:500;
  padding:.18rem .5rem;cursor:pointer;transition:border-color .15s,color .15s;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.ok{border-color:var(--green);color:var(--green)}

pre{
  margin:0;padding:.75rem .95rem;overflow-x:auto;max-height:230px;
  font-family:var(--mono);font-size:.75rem;line-height:1.65;color:#CDD9E5;tab-size:2;
}
pre::-webkit-scrollbar{height:4px;width:4px}
pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* STATES */
.state{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted);font-size:.86rem}
.spin{
  width:24px;height:24px;margin:0 auto .8rem;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:rot .65s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* MOBILE */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
@media(max-width:640px){
  #sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:160;transform:translateX(0)}
  #sidebar.closed{transform:translateX(-100%);width:var(--sidebar)}
  #overlay.show{display:block}
}
</style>
</head>
<body>

<topbar>
  <button class="hamburger" id="toggleBtn" title="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <a class="topbar-logo" href="#">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
    </svg>
    Script Code
  </a>
  <div class="topbar-search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" type="search" placeholder="Search…" autocomplete="off"/>
  </div>
</topbar>

<div class="layout">
  <div id="sidebar">
    <div class="sidebar-head">Script Files</div>
    <div id="fileList"></div>
  </div>
  <div id="overlay"></div>

  <div id="content">
    <div id="welcome">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <h2>Select a file from the sidebar</h2>
      <p>.</p>
    </div>

    <div id="snippetPanel" style="display:none">
      <div class="content-header">
        <span class="content-title" id="panelTitle"></span>
        <span id="countLabel"></span>
      </div>
      <div id="grid"></div>
    </div>
  </div>
</div>

<script>
const FILES = [
  {
    label: "JavaScript",
    url: "https://raw.githubusercontent.com/Hamza123455/masterfile/main/erp_assistant_code/invoice_posting.json"
  },
  /*{
    label: "Python",
    url: "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/python.json"
  },
  {
    label: "Bash Scripts",
    url: "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/bash.json"
  },*/
  // { label: "CSS Tricks", url: "https://raw.githubusercontent.com/..." },
];
// ================================================================

const fileList     = document.getElementById("fileList");
const welcome      = document.getElementById("welcome");
const snippetPanel = document.getElementById("snippetPanel");
const panelTitle   = document.getElementById("panelTitle");
const countLabel   = document.getElementById("countLabel");
const grid         = document.getElementById("grid");
const searchInput  = document.getElementById("searchInput");
const sidebar      = document.getElementById("sidebar");
const overlay      = document.getElementById("overlay");

let currentSnippets = [];

// build sidebar list
FILES.forEach((f, i) => {
  const item = document.createElement("div");
  item.className = "file-item";
  item.innerHTML = `
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span>${esc(f.label)}</span>`;
  item.addEventListener("click", () => loadFile(i));
  fileList.appendChild(item);
});

async function loadFile(i) {
  fileList.querySelectorAll(".file-item").forEach((el, j) =>
    el.classList.toggle("active", j === i));

  if (window.innerWidth <= 640) closeSidebar();

  welcome.style.display = "none";
  snippetPanel.style.display = "block";
  panelTitle.textContent = FILES[i].label;
  countLabel.textContent = "";
  searchInput.value = "";
  grid.innerHTML = `<div class="state"><div class="spin"></div>Loading…</div>`;

  try {
    const res = await fetch(FILES[i].url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    currentSnippets = Array.isArray(data) ? data : (data.snippets ?? []);
    render();
  } catch (err) {
    grid.innerHTML = `<div class="state">
      <p style="font-size:.95rem;margin-bottom:.35rem">⚠ Failed to load</p>
      <p style="font-size:.76rem">${err.message}</p>
    </div>`;
  }
}

function render() {
  const q = searchInput.value.trim().toLowerCase();
  const list = currentSnippets.filter(s =>
    !q || [s.title, s.description, s.code]
      .filter(Boolean).some(v => v.toLowerCase().includes(q))
  );

  countLabel.textContent = list.length + " snippet" + (list.length !== 1 ? "s" : "");

  if (!list.length) {
    grid.innerHTML = `<div class="state">No snippets match your search.</div>`;
    return;
  }

  grid.innerHTML = list.map(s => {
    const code  = s.code || "";
    const lines = code.split("\n").length;
    return `
    <article class="card">
      <div class="card-top">
        <div class="card-title">${esc(s.title || "Untitled")}</div>
        ${s.description ? `<div class="card-desc">${esc(s.description)}</div>` : ""}
      </div>
      <div class="code-area">
        <div class="code-bar">
          <span>${lines} line${lines !== 1 ? "s" : ""}</span>
          <button class="copy-btn" data-code="${encodeURIComponent(code)}">
            ${iCopy()} Copy
          </button>
        </div>
        <pre><code>${esc(code)}</code></pre>
      </div>
    </article>`;
  }).join("");

  grid.querySelectorAll(".copy-btn").forEach(btn =>
    btn.addEventListener("click", async () => {
      const text = decodeURIComponent(btn.dataset.code);
      try { await navigator.clipboard.writeText(text); } catch { fbCopy(text); }
      btn.classList.add("ok");
      btn.innerHTML = iCheck() + " Copied!";
      setTimeout(() => { btn.classList.remove("ok"); btn.innerHTML = iCopy() + " Copy"; }, 2000);
    })
  );
}

searchInput.addEventListener("input", render);

document.getElementById("toggleBtn").addEventListener("click", () => {
  sidebar.classList.toggle("closed");
  overlay.classList.toggle("show");
});
overlay.addEventListener("click", closeSidebar);
function closeSidebar() {
  sidebar.classList.add("closed");
  overlay.classList.remove("show");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fbCopy(t) {
  const ta = Object.assign(document.createElement("textarea"), {value:t, style:"position:fixed;opacity:0"});
  document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
}
function iCopy() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
}
function iCheck() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
}
</script>
</body>
</html>
